spring:
  datasource:
    url: jdbc:mysql://localhost:3306/suyuanchain?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  sql:
    init:
      mode: never
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
  jmx:
    enabled: true
    unique-names: true

server:
  port: 8080

# 添加JMX远程连接配置
management:
  endpoints:
    jmx:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

jwt:
  secret: your-secret-key-here-make-it-long-and-secure-in-production
  expiration: 86400 