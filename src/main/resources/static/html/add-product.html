<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加新产品 - 产品溯源管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>
    <script src="../js/add-product.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body>
<div class="container">
    <!-- 侧边栏容器 -->
    <div class="sidebar-container"></div>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="header">
            <div class="search-bar">
<!--                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">-->
<!--                    <circle cx="11" cy="11" r="8"></circle>-->
<!--                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>-->
<!--                </svg>-->
<!--                <input type="search" placeholder="搜索...">-->
            </div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <div>
                    <h2>添加新产品</h2>
                    <p>创建新的产品记录并上链</p>
                </div>
                <a href="products.html" class="btn btn-outline">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    返回产品列表
                </a>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>产品信息</h3>
                    <p class="description">请填写产品的基本信息，所有字段都是必填的</p>
                </div>
                <div class="card-body">
                    <form id="addProductForm" class="form">
                        <div class="form-group">
                            <label for="productId">产品ID</label>
                            <input type="text" id="productId" name="productId" required>
                            <small class="form-text">唯一的产品标识符</small>
                        </div>
                        <div class="form-group">
                            <label for="name">产品名称</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="manufacturer">生产商</label>
                            <input type="text" id="manufacturer" name="manufacturer" required>
                        </div>
                        <div class="form-group">
                            <label for="batchNumber">批次号</label>
                            <input type="text" id="batchNumber" name="batchNumber" required>
                        </div>
                        <div class="form-group">
                            <label for="origin">产地</label>
                            <input type="text" id="origin" name="origin" required>
                        </div>
                        <div class="form-group">
                            <label for="productSpec">产品规格</label>
                            <input type="text" id="productSpec" name="productSpec" required>
                            <small class="form-text">例如：500ml、1kg等</small>
                        </div>
                        <div class="form-group">
                            <label for="productDescription">产品描述</label>
                            <textarea id="productDescription" name="productDescription" rows="4" required></textarea>
                            <small class="form-text">详细描述产品的特点和用途</small>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                    <polyline points="7 3 7 8 15 8"></polyline>
                                </svg>
                                保存并上链
                            </button>
                            <button type="reset" class="btn btn-outline">重置</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
