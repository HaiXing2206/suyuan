<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据治理 - 产品溯源管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/analysis.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body>
<div class="container">
    <div class="sidebar-container"></div>

    <main class="main-content">
        <header class="header">
            <div class="search-bar"></div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>数据治理</h2>
                <p>围绕“台账-分类分级-敏感识别-归档闭环”的治理看板，直观反映当前治理质量</p>
            </div>

            <div class="stats-cards">
                <div class="card">
                    <div class="card-body">
                        <h3>台账要素总数</h3>
                        <p class="description">已登记的数据要素数量</p>
                        <div class="stat-value" id="ledgerTotalCount">0</div>
                        <p class="stat-change neutral">实时统计</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h3>敏感数据占比</h3>
                        <p class="description">敏感要素在台账中的占比</p>
                        <div class="stat-value" id="sensitiveRatio">0%</div>
                        <p class="stat-change" id="sensitiveCountText">敏感 0 条</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h3>归档完成率</h3>
                        <p class="description">已归档要素占比</p>
                        <div class="stat-value" id="archiveRatio">0%</div>
                        <p class="stat-change" id="archiveCountText">已归档 0 条</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h3>近30天新增</h3>
                        <p class="description">最近30天新增入账要素</p>
                        <div class="stat-value" id="recentIncrement">0</div>
                        <p class="stat-change neutral">持续更新中</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>分类分级分布</h3>
                        <p class="description">业务数据/运营数据/敏感数据占比</p>
                    </div>
                    <div class="card-body">
                        <canvas id="classificationChart" height="250"></canvas>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>数据等级分布</h3>
                        <p class="description">L1-L3治理等级覆盖情况</p>
                    </div>
                    <div class="card-body">
                        <canvas id="levelChart" height="250"></canvas>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>部门治理负载 TOP5</h3>
                        <p class="description">按要素数量统计重点治理部门</p>
                    </div>
                    <div class="card-body">
                        <canvas id="departmentChart" height="250"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3>月度入账趋势</h3>
                        <p class="description">按创建时间统计台账新增趋势</p>
                    </div>
                    <div class="card-body">
                        <canvas id="monthlyLedgerChart" height="250"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const username = localStorage.getItem('username');
        if (username) {
            document.getElementById('currentUsername').textContent = `欢迎，${username}`;
        }
    });
</script>
</body>
</html>
