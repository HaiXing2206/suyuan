<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据要素评估与审计平台</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/index.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body>
<div class="container">
    <!-- 侧边栏容器 -->
    <div class="sidebar-container"></div>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="header">
            <div class="search-bar">
<!--                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">-->
<!--                    <circle cx="11" cy="11" r="8"></circle>-->
<!--                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>-->
<!--                </svg>-->
                <!-- <input type="search" placeholder="搜索..."> -->
            </div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2 id="welcome-title">加载中...</h2>
                <p>覆盖台账登记、数据治理、评估任务、审核发布、归档留痕与审计追踪的全流程管理</p>
                <div class="process-flow-tip">
                    主流程：台账 → 治理 → 评估任务 → 审核 → 报告 → 归档 → 审计
                </div>
            </div>

            <div class="stats-cards">
                <div class="card">
                    <div class="card-body">
                        <h3>台账条目总数</h3>
                        <p class="description">系统中的数据要素台账总数量</p>
                        <div class="stat-value">0</div>
                        <p class="stat-change">较上月增长 0%</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h3>进行中评估任务</h3>
                        <p class="description">当前处于执行中的评估任务数量</p>
                        <div class="stat-value">0</div>
                        <p class="stat-change">较上月增长 0%</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h3>待审核事项</h3>
                        <p class="description">本月待初审/复审/终审的事项数量</p>
                        <div class="stat-value">0</div>
                        <p class="stat-change">较上月增长 0%</p>
                    </div>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <div class="card-header">
                        <h3>最近新增的台账条目</h3>
                        <p class="description">系统中最近新增的数据要素台账信息</p>
                    </div>
                    <div class="card-body">
                        <div class="recent-products">
                            <div class="no-data">暂无台账数据</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>最近流程活动</h3>
                        <p class="description">提交、计算、审核、发布等最新流程记录</p>
                    </div>
                    <div class="card-body">
                        <div class="activity-list">
                            <div class="no-data">暂无活动数据</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/auth.js"></script>
<script src="../js/dashboard.js"></script>
<script>
    // 显示当前用户名
    document.addEventListener('DOMContentLoaded', function() {
        const username = localStorage.getItem('username');
        if (username) {
            document.getElementById('currentUsername').textContent = `欢迎，${username}`;
        }
    });
</script>
</body>
</html>
