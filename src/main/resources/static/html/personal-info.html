<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 产品溯源管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>
</head>
<body>
<div class="container">
    <!-- 侧边栏容器 -->
    <div class="sidebar-container"></div>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="header">
            <div class="search-bar">
                <!-- 搜索栏占位 -->
            </div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>个人信息</h2>
                <p>查看和编辑您的个人账户信息</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <form id="personalInfoForm" class="form">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" name="username" required>
                            <small>用户名可以修改</small>
                        </div>

                        <div class="form-group">
                            <label for="email">电子邮箱</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">手机号码</label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>

                        <div class="form-group">
                            <label for="role">用户角色</label>
                            <input type="text" id="role" name="role" readonly>
                            <small>角色不可修改</small>
                        </div>

                        <div class="form-group">
                            <label for="status">账户状态</label>
                            <input type="text" id="status" name="status" readonly>
                        </div>

                        <div class="form-group">
                            <label for="registeredAt">注册时间</label>
                            <input type="text" id="registeredAt" name="registeredAt" readonly>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">返回</button>
                            <button type="submit" class="btn btn-primary">保存更改</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="../js/sidebar.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 显示当前用户名
    const username = localStorage.getItem('username');
    if (username) {
        document.getElementById('currentUsername').textContent = `欢迎，${username}`;
    }

    // 获取用户信息
    fetch('/api/users/info', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + localStorage.getItem('token')
        }
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('username').value = data.username;
        document.getElementById('email').value = data.email || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('role').value = data.role;
        document.getElementById('status').value = data.status;
        document.getElementById('registeredAt').value = new Date(data.registeredAt).toLocaleString();
    })
    .catch(error => {
        console.error('Error:', error);
        showNotification('获取用户信息失败', 'error');
    });

    // 表单提交处理
    document.getElementById('personalInfoForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value
        };

        fetch('/api/users/update', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                showNotification('个人信息更新成功', 'success');
                // 更新本地存储的用户名
                localStorage.setItem('username', formData.username);
                // 更新页面显示的用户名
                document.getElementById('currentUsername').textContent = `欢迎，${formData.username}`;
            } else {
                showNotification(data.message || '更新失败', 'error');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showNotification('更新失败，请稍后重试', 'error');
        });
    });
});

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.innerHTML = `
        <div class="notification-content">
            <div class="message">${message}</div>
        </div>
    `;
    document.body.appendChild(notification);
    setTimeout(() => {
        notification.classList.add('show');
    }, 100);
    setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
            notification.remove();
        }, 300);
    }, 3000);
}
</script>
</body>
</html>
