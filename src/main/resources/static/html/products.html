<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品管理 - 产品溯源管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>
    <script src="../js/products.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body>
<div class="container">
    <!-- 侧边栏容器 -->
    <div class="sidebar-container"></div>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="header">
            <div class="search-bar">
<!--                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">-->
<!--                    <circle cx="11" cy="11" r="8"></circle>-->
<!--                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>-->
<!--                </svg>-->
<!--                <input type="search" placeholder="搜索...">-->
            </div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <div>
                    <h2>产品管理</h2>
                    <p>管理所有产品信息、生产批次和溯源数据</p>
                </div>
                <a href="add-product.html" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    添加新产品
                </a>
            </div>

            <div class="filter-bar">
                <div class="search-input">
                    <input type="text" id="searchInput" placeholder="搜索产品名称、批次号或生产商...">
                </div>
                <div class="filter-selects">
                    <select id="categoryFilter">
                        <option value="all">所有类别</option>
                        <option value="food">食品</option>
                        <option value="beverage">饮料</option>
                        <option value="agriculture">农产品</option>
                    </select>
                    <select id="statusFilter">
                        <option value="all">所有状态</option>
                        <option value="active">在售</option>
                        <option value="inactive">下架</option>
                    </select>
                </div>
            </div>

            <!-- 添加产品模态框 -->
            <div id="productModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <h3 id="modalTitle">添加产品</h3>
                    <form id="productForm">
                        <div class="form-group">
                            <label for="productName">产品名称</label>
                            <input type="text" id="productName" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="productCategory">类别</label>
                            <select id="productCategory" name="category" required>
                                <option value="food">食品</option>
                                <option value="beverage">饮料</option>
                                <option value="agriculture">农产品</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="productPrice">价格</label>
                            <input type="number" id="productPrice" name="price" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="productStock">库存</label>
                            <input type="number" id="productStock" name="stock" required>
                        </div>
                        <div class="form-group">
                            <label for="productStatus">状态</label>
                            <select id="productStatus" name="status" required>
                                <option value="active">在售</option>
                                <option value="inactive">下架</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>产品列表</h3>
                    <p class="description">系统中所有产品的详细信息和溯源数据</p>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>产品ID</th>
                                <th>产品名称</th>
                                <th>生产商</th>
                                <th>批次号</th>
                                <th>生产日期</th>
                                <th>产地</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="productTableBody">
                                <!-- 产品数据将通过JavaScript动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
