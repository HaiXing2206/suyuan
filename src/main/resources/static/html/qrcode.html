<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品二维码 - 产品溯源管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        @media print {
            .qrcode-header, .card-footer {
                display: none;
            }
            .qrcode-container {
                padding: 0;
            }
            .qrcode-card {
                box-shadow: none;
            }
        }
        .qrcode-display {
            text-align: center;
            margin: 20px 0;
        }
        .qrcode-display img {
            max-width: 200px;
            height: auto;
        }
        .product-info-list {
            margin: 20px 0;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .info-label {
            color: #666;
            font-weight: 500;
        }
        .info-value {
            color: #333;
        }
        .error-message {
            background-color: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .error-message::before {
            content: "!";
            display: inline-block;
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            background-color: #ff4d4f;
            color: white;
            border-radius: 50%;
            margin-right: 8px;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="qrcode-container">
    <header class="qrcode-header">
        <a href="#" id="back-link" class="btn-icon back-button">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="logo-small">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            </svg>
            <h1>产品溯源二维码</h1>
        </div>
    </header>

    <div class="card qrcode-card">
        <div class="card-header text-center">
            <h2 id="product-name">加载中...</h2>
            <p id="product-batch">批次号: 加载中...</p>
        </div>
        <div class="card-body">
            <div class="qrcode-display">
                <div id="qrcode">
                    <div class="loading">正在加载二维码...</div>
                </div>
            </div>
            <div class="product-info-list">
                <div class="info-item">
                    <span class="info-label">产品名称</span>
                    <span id="info-name" class="info-value">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">批次号</span>
                    <span id="info-batch" class="info-value">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">生产商</span>
                    <span id="info-manufacturer" class="info-value">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">生产日期</span>
                    <span id="info-date" class="info-value">加载中...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">产地</span>
                    <span id="info-origin" class="info-value">加载中...</span>
                </div>
            </div>
        </div>
        <div class="card-footer">
            <button id="download-qr" class="btn btn-primary btn-block">下载二维码</button>
            <button id="print-qr" class="btn btn-outline btn-block">打印标签</button>
        </div>
    </div>
</div>

<script src="../js/qrcode.js"></script>
</body>
</html>
