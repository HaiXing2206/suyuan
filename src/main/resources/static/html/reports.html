<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报告中心与归档 - 数据要素评估与审计平台</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>
    <script src="../js/users.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body>
<div class="container">
    <div class="sidebar-container"></div>

    <main class="main-content">
        <header class="header">
            <div class="search-bar"></div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>报告中心与归档</h2>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>报告中心与归档</h3>
                    <p class="description">按任务生成报告、在线预览、导出记录、发布归档与版本留痕</p>
                </div>
                <div class="card-body">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="reportTaskSelect">评估任务</label>
                            <select id="reportTaskSelect"></select>
                        </div>
                        <div class="form-group">
                            <label for="reportTemplate">报告模板</label>
                            <select id="reportTemplate">
                                <option value="STANDARD">标准模板（STANDARD）</option>
                                <option value="DEPARTMENT">部门模板（DEPARTMENT）</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" type="button" onclick="generateEvaluationReport()">生成报告</button>
                        <button class="btn btn-outline" type="button" onclick="loadEvaluationReports()">刷新报告记录</button>
                    </div>

                    <div class="stats-cards" style="margin-top: 16px;">
                        <div class="card">
                            <div class="card-body">
                                <h3>已生成报告</h3>
                                <div id="reportGeneratedCount" class="stat-value">0</div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-body">
                                <h3>已导出报告</h3>
                                <div id="reportExportedCount" class="stat-value">0</div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-body">
                                <h3>已归档报告</h3>
                                <div id="reportArchivedCount" class="stat-value">0</div>
                            </div>
                        </div>
                    </div>

                    <div class="table-responsive" style="margin-top: 16px;">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>报告ID</th>
                                <th>任务ID/名称</th>
                                <th>模板/版本</th>
                                <th>预览</th>
                                <th>导出状态</th>
                                <th>归档状态</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="reportTableBody"></tbody>
                        </table>
                    </div>

                    <div class="table-responsive" style="margin-top: 16px;">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>导出记录ID</th>
                                <th>任务ID/名称</th>
                                <th>报告版本</th>
                                <th>导出格式</th>
                                <th>导出状态</th>
                                <th>归档状态</th>
                                <th>导出/创建时间</th>
                            </tr>
                            </thead>
                            <tbody id="exportRecordTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // 显示当前用户名
    document.getElementById('currentUsername').textContent = localStorage.getItem('username') || '用户';
</script>
</body>
</html>
