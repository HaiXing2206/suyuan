<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评估任务 - 产品溯源管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/auth.js"></script>
    <script src="../js/analysis.js"></script>
    <script src="../js/sidebar.js"></script>
</head>
<body>
<div class="container">
    <div class="sidebar-container"></div>

    <main class="main-content">
        <header class="header">
            <div class="search-bar"></div>
            <div class="user-info">
                <a href="personal-info.html" class="username-link">
                    <span id="currentUsername"></span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <div class="content">
            <div class="page-header">
                <h2>评估任务</h2>
                <p>任务创建、计算提交、结果回填与审阅</p>
            </div>

            <div class="card" id="tasks">
                <div class="card-header">
                    <h3>评估任务引擎对接与结果回填</h3>
                    <p class="description">支持任务创建、指标版本选择、提交计算、结果回填和审阅</p>
                </div>
                <div class="card-body">
                    <form id="evaluationTaskForm" class="form-grid">
                        <div class="form-group">
                            <label for="taskName">任务名称</label>
                            <input type="text" id="taskName" required placeholder="例如：2026Q1-数据要素评估">
                        </div>
                        <div class="form-group">
                            <label for="elementId">数据要素ID</label>
                            <input type="text" id="elementId" required placeholder="关联台账 element_id">
                        </div>
                        <div class="form-group">
                            <label for="indicatorVersion">指标体系版本</label>
                            <select id="indicatorVersion" required>
                                <option value="V1.0">V1.0</option>
                                <option value="V1.1">V1.1</option>
                                <option value="V2.0">V2.0</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="dueTime">截止时间</label>
                            <input type="datetime-local" id="dueTime" required>
                        </div>
                        <div class="form-group">
                            <label for="taskDataLevel">数据分级</label>
                            <select id="taskDataLevel">
                                <option value="L1">L1</option>
                                <option value="L2" selected>L2</option>
                                <option value="L3">L3</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskSensitiveFlag">敏感数据</label>
                            <select id="taskSensitiveFlag">
                                <option value="false" selected>否</option>
                                <option value="true">是</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">创建评估任务</button>
                    </form>

                    <div class="table-responsive" style="margin-top: 16px;">
                        <table class="table">
                            <thead>
                            <tr>
                                <th>任务名称</th>
                                <th>数据要素ID</th>
                                <th>指标版本</th>
                                <th>状态</th>
                                <th>得分/等级</th>
                                <th>问题项</th>
                                <th>操作</th>
                            </tr>
                            </thead>
                            <tbody id="evaluationTaskTableBody"></tbody>
                        </table>
                    </div>

                    <div id="taskResultPanel" class="card" style="margin-top: 16px; display: none;">
                        <div class="card-header">
                            <h3>任务结果审阅与回填</h3>
                            <p class="description" id="selectedTaskTitle">请选择任务后查看详情</p>
                        </div>
                        <div class="card-body">
                            <form id="taskResultForm" class="form-grid">
                                <input type="hidden" id="selectedTaskId">
                                <div class="form-group">
                                    <label for="resultScore">回填得分</label>
                                    <input type="number" id="resultScore" min="0" max="100" step="0.01" required>
                                </div>
                                <div class="form-group">
                                    <label for="resultGrade">回填等级</label>
                                    <select id="resultGrade">
                                        <option value="">自动计算</option>
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                        <option value="C">C</option>
                                        <option value="D">D</option>
                                    </select>
                                </div>
                                <div class="form-group" style="grid-column: 1 / -1;">
                                    <label for="issueList">问题项</label>
                                    <textarea id="issueList" rows="3" placeholder="多个问题建议使用分号分隔"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary">保存回填结果</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const username = localStorage.getItem('username');
        if (username) {
            document.getElementById('currentUsername').textContent = `欢迎，${username}`;
        }
    });
</script>
</body>
</html>
